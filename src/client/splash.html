<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Putt Together</title>
  </head>
  <body class="app">
    <div class="green">
      <div class="ball"></div>
      <div class="cup"></div>
      <div class="flagpole"></div>

    <button class="start-button" id="start-button">TEE OFF</button>
    <script type="module" src="splash.ts" defer></script>
